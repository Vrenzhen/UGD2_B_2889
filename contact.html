<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portfolio - Contact Me</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="index.html" class="home-icon">🏠</a>
        </div>
        <div class="nav-right">
            <a href="about.html">About me</a>
            <a href="skills.html">Skills</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contact.html" class="btn-contact">CONTACT ME</a>
        </div>
    </nav>

    <section class="page-section">
        <div class="left-content">
            <h2>Contact Me</h2>
            <p>Silakan isi form di sebelah kanan untuk menghubungi saya. Saya akan membalas pesan Anda secepat mungkin.</p>
        </div>
        <div class="right-content">
            <h3>SEND MESSAGE</h3>
            
            <form class="contact-form" id="contactForm" onsubmit="kirimPesan(event)">
                <input type="text" placeholder="Enter your name*" required>
                <input type="email" placeholder="Enter your email*" required>
                <input type="text" placeholder="Phone number">
                <textarea placeholder="Your message*" rows="4" required></textarea>
                <button type="submit" class="btn-submit">SUBMIT</button>
            </form>

            <div id="pesanSukses" style="display: none; background: rgba(16, 185, 129, 0.2); padding: 20px; border-radius: 10px; border: 1px solid #10b981; text-align: center; width: 80%;">
                <h4 style="color: #10b981; margin-bottom: 10px;">✅ Pesan Berhasil Terkirim!</h4>
                <p style="font-size: 14px;">Terima kasih telah menghubungi saya. Saya akan segera membalas email Anda.</p>
                <button onclick="resetForm()" class="btn-submit" style="padding: 10px 20px; font-size: 12px;">Kirim Pesan Lain</button>
            </div>

        </div>
    </section>

    <script>
        function kirimPesan(event) {
            event.preventDefault(); 
            document.getElementById('contactForm').style.display = 'none';
            document.getElementById('pesanSukses').style.display = 'block';
        }

        function resetForm() {
            document.getElementById('contactForm').reset();
            document.getElementById('contactForm').style.display = 'flex';
            document.getElementById('pesanSukses').style.display = 'none';
        }
    </script>
</body>
</html>
